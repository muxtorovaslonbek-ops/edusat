<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet yo'q - English Pro Plus</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #020617;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
      align-items: center;
      text-align: center;
    }
    .container {
      max-width: 400px;
      width: 100%;
      margin: auto;
    }
    .icon {
      width: 80px;
      height: 80px;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.025em;
      margin: 0 0 12px;
      line-height: 1.1;
    }
    .highlight {
      background: linear-gradient(to right, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px;
    }
    .card {
      background-color: rgba(15, 23, 42, 0.5);
      border: 1px solid #1e293b;
      padding: 20px;
      border-radius: 24px;
      text-align: left;
      margin-bottom: 24px;
    }
    .card-title {
      font-weight: 800;
      color: #818cf8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .card-text {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
      margin: 0;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #6366f1, #10b981);
      border: none;
      border-radius: 16px;
      color: #020617;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.95;
    }
    .footer {
      font-size: 10px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div></div>
  <div class="container">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M12 20h.01"/>
      </svg>
    </div>
    <h1>Internet Aloqasi <br><span class="highlight">Mavjud Emas</span></h1>
    <p>Siz hozir offline rejimdasiz. Internetga ulanishingizni tekshirib qayta urinib ko'ring.</p>
    
    <div class="card">
      <div class="card-title">Offline maslahat</div>
      <p class="card-text">Darslar va so'zlarni internet yo'q paytda ham mustaqil takrorlashda davom eting!</p>
    </div>

    <button class="btn" onclick="window.location.reload()">Qaytadan yuklash</button>
  </div>
  <div class="footer">English Pro Plus © 2026</div>
</body>
</html>
